<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ title if title else "PlantOS" }}</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PlantOS">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
    /* ─── Design Tokens ─────────────────────────────────────── */
    :root {
        --bg:            #f0f4f8;
        --surface:       #ffffff;
        --surface-2:     #f8fafc;
        --header-bg:     #0c2627;
        --nav-bg:        #0e3432;
        --border:        #e2e8f0;
        --border-strong: #cbd5e1;

        --text-1: #0f172a;
        --text-2: #475569;
        --text-3: #94a3b8;

        --green:      #569749;
        --green-hover:#3e7a36;
        --green-500:  #73ba79;
        --green-50:   #eef7ed;
        --green-100:  #d5e8d4;
        --green-200:  #b4d6b2;

        --blue:       #2563eb;
        --blue-hover: #1d4ed8;
        --blue-50:    #eff6ff;
        --blue-200:   #bfdbfe;

        --amber:      #d97706;
        --amber-50:   #fffbeb;
        --amber-200:  #fde68a;

        --red:        #dc2626;
        --red-50:     #fef2f2;
        --red-200:    #fecaca;

        --shadow-sm: 0 1px 3px rgba(12,38,39,0.06), 0 1px 2px rgba(12,38,39,0.04);
        --shadow:    0 4px 6px -1px rgba(12,38,39,0.07), 0 2px 4px -2px rgba(12,38,39,0.04);
        --shadow-lg: 0 10px 15px -3px rgba(12,38,39,0.1),  0 4px 6px -4px rgba(12,38,39,0.05);

        --r-xs: 6px;
        --r-sm: 8px;
        --r:    12px;
        --r-lg: 16px;
        --r-xl: 20px;

        --header-h:      58px;
        --desktop-nav-h: 40px;
        --mob-nav-h:     60px;
    }

    /* ─── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text-1);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.5;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    @media (max-width: 768px) {
        body { padding-bottom: calc(var(--mob-nav-h) + env(safe-area-inset-bottom, 0px)); }
        /* iOS PWA: html layer shows in safe-area & rubber-band zones; match bottom nav */
        html { background-color: var(--header-bg); }
    }

    img { display: block; max-width: 100%; }
    a   { color: inherit; }

    /* ─── Header ────────────────────────────────────────────── */
    header {
        height: var(--header-h);
        background: var(--header-bg);
        display: flex;
        align-items: center;
        padding: 0 1.5rem;
        position: sticky;
        top: 0;
        z-index: 200;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        gap: 1rem;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        text-decoration: none;
        flex-shrink: 0;
    }

    .brand-icon {
        width: 30px;
        height: 30px;
        background: rgba(255,255,255,0.08);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(86,151,73,0.35);
    }

    .brand-text {
        font-size: 1.05rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.02em;
    }
    .brand-text em { font-style: normal; color: #73ba79; }

    .header-pill {
        background: rgba(115,186,121,0.15);
        border: 1px solid rgba(115,186,121,0.3);
        color: #73ba79;
        font-size: 0.6rem;
        font-weight: 700;
        padding: 0.15rem 0.45rem;
        border-radius: 4px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }

    .header-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .status-indicator {
        display: flex;
        align-items: center;
        gap: 0.4rem;
    }

    .status-dot {
        width: 7px;
        height: 7px;
        background: #73ba79;
        border-radius: 50%;
        animation: blink 2.4s ease-in-out infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
    }

    .status-label {
        font-size: 0.72rem;
        color: #64748b;
        font-weight: 500;
    }

    /* ─── Desktop Nav ───────────────────────────────────────── */
    .desktop-nav {
        background: var(--nav-bg);
        padding: 0 1.5rem;
        display: flex;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .desktop-nav a {
        color: #8898aa;
        text-decoration: none;
        font-size: 0.845rem;
        font-weight: 500;
        padding: 0.65rem 0.875rem;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
    }

    .desktop-nav a:hover  { color: #e2e8f0; }
    .desktop-nav a.active { color: #fff; border-bottom-color: #73ba79; }

    /* ─── Mobile Bottom Navigation ─────────────────────────── */
    .mobile-nav {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: calc(var(--mob-nav-h) + env(safe-area-inset-bottom, 0px));
        padding-bottom: env(safe-area-inset-bottom, 0px);
        background: var(--header-bg);
        border-top: 1px solid rgba(255,255,255,0.1);
        z-index: 200;
        justify-content: space-around;
        align-items: flex-start;
        padding-top: 8px;
    }

    @media (max-width: 768px) {
        .desktop-nav { display: none; }
        .mobile-nav  { display: flex; }
    }

    .mobile-nav a {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.2rem;
        color: #64748b;
        text-decoration: none;
        font-size: 0.58rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 0.3rem 0.75rem;
        border-radius: var(--r-sm);
        transition: color 0.15s;
        flex: 1;
        max-width: 80px;
    }

    .mobile-nav a.active { color: #73ba79; }

    .mobile-nav .nav-icon {
        font-size: 1.35rem;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.15s;
    }
    .mobile-nav a.active .nav-icon { transform: scale(1.1); }

    /* FAB add button */
    .mob-fab {
        background: linear-gradient(135deg, #3e7a36, #569749) !important;
        color: white !important;
        border-radius: 50% !important;
        width: 48px;
        height: 48px;
        max-width: 60px !important;
        padding: 0 !important;
        margin-top: -14px;
        box-shadow: 0 4px 14px rgba(86,151,73,0.5);
        justify-content: center;
        align-items: center;
        display: flex !important;
        flex-direction: row !important;
        font-size: 0 !important;
    }

    .mob-fab .nav-icon {
        font-size: 1.4rem !important;
        transform: none !important;
        color: white;
    }

    /* ─── Main Layout ───────────────────────────────────────── */
    main {
        padding: 1.5rem;
        flex: 1;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    @media (max-width: 768px) { main { padding: 1rem; } }

    /* ─── Cards ─────────────────────────────────────────────── */
    .card {
        background: var(--surface);
        border-radius: var(--r);
        padding: 1.25rem;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        margin-bottom: 1rem;
    }

    .card-hd {
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-3);
        margin: 0 0 1rem;
    }

    /* ─── Form elements ─────────────────────────────────────── */
    .form-field {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
    }

    .form-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-2);
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    input[type="text"],
    input[type="number"],
    select {
        padding: 0.6rem 0.875rem;
        border-radius: var(--r-sm);
        border: 1.5px solid var(--border);
        font-size: 0.875rem;
        font-family: inherit;
        background: var(--surface);
        color: var(--text-1);
        transition: border-color 0.15s, box-shadow 0.15s;
        width: 100%;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
        outline: none;
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
    }

    input[type="file"] {
        font-size: 0.85rem;
        color: var(--text-2);
        font-family: inherit;
    }

    /* ─── Buttons ───────────────────────────────────────────── */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        padding: 0.6rem 1.25rem;
        border-radius: var(--r-sm);
        border: none;
        font-size: 0.875rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
        line-height: 1;
        white-space: nowrap;
        min-height: 40px;
        user-select: none;
    }

    .btn:active { transform: scale(0.98); }

    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover { background: var(--green-hover); box-shadow: 0 2px 10px rgba(22,163,74,0.35); }

    .btn-blue  { background: var(--blue); color: #fff; }
    .btn-blue:hover { background: var(--blue-hover); box-shadow: 0 2px 10px rgba(37,99,235,0.35); }

    .btn-ghost {
        background: var(--surface);
        color: var(--text-2);
        border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); border-color: var(--border-strong); }

    .btn-sm  { padding: 0.4rem 0.875rem; font-size: 0.8rem;  min-height: 34px; }
    .btn-lg  { padding: 0.75rem 1.5rem;  font-size: 0.95rem; min-height: 48px; }
    .btn-full { width: 100%; }

    @media (max-width: 768px) {
        .btn    { min-height: 44px; }
        .btn-sm { min-height: 40px; }
    }

    /* ─── Alerts ────────────────────────────────────────────── */
    .alert {
        padding: 0.8rem 1rem;
        border-radius: var(--r-sm);
        margin-bottom: 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        border: 1.5px solid;
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
    }

    .alert-error   { background: var(--red-50);   color: #991b1b; border-color: var(--red-200);   }
    .alert-success { background: var(--green-50);  color: #15803d; border-color: var(--green-200); }
    .alert-info    { background: var(--blue-50);   color: #1e40af; border-color: var(--blue-200);  }

    /* ─── Breadcrumb ────────────────────────────────────────── */
    .breadcrumb {
        font-size: 0.8rem;
        color: var(--text-3);
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        flex-wrap: wrap;
    }
    .breadcrumb a     { color: var(--text-2); text-decoration: none; transition: color 0.15s; }
    .breadcrumb a:hover { color: var(--text-1); }
    .breadcrumb .sep  { color: var(--border-strong); }

    /* ─── Section header ────────────────────────────────────── */
    .sec-hd {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.25rem;
        flex-wrap: wrap;
    }

    .sec-title {
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--text-1);
        letter-spacing: -0.025em;
        line-height: 1.2;
    }

    .sec-sub {
        font-size: 0.82rem;
        color: var(--text-3);
        margin-top: 0.2rem;
        font-weight: 400;
    }

    /* ─── Status chips ──────────────────────────────────────── */
    .chip {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.2rem 0.55rem;
        border-radius: 20px;
        font-size: 0.68rem;
        font-weight: 600;
        border: 1px solid transparent;
        white-space: nowrap;
    }

    .chip-green { background: var(--green-50);  color: #15803d; border-color: var(--green-200); }
    .chip-gray  { background: var(--surface-2); color: var(--text-3); border-color: var(--border); }
    .chip-amber { background: var(--amber-50);  color: #92400e; border-color: var(--amber-200); }
    .chip-red   { background: var(--red-50);    color: #991b1b; border-color: var(--red-200);   }
    .chip-blue  { background: var(--blue-50);   color: #1d4ed8; border-color: var(--blue-200);  }

    /* ─── Divider ───────────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    /* ─── Footer ────────────────────────────────────────────── */
    footer {
        text-align: center;
        padding: 2rem 1.5rem;
        font-size: 0.75rem;
        color: var(--text-3);
        border-top: 1px solid var(--border);
        margin-top: 2rem;
    }

    @media (max-width: 768px) { footer { display: none; } }

    /* ─── Utility ───────────────────────────────────────────── */
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    .mono { font-family: 'SF Mono', ui-monospace, monospace; }

    /* ─── Global Loading Overlay ────────────────────────────── */
    #g-loading {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.5);
        z-index: 900;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
    }
    #g-loading.active { display: flex; }

    #g-loading-box {
        background: var(--surface);
        border-radius: var(--r-xl);
        padding: 2rem 2.5rem;
        text-align: center;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border);
        min-width: 200px;
    }

    .g-spinner {
        width: 38px;
        height: 38px;
        border: 3px solid var(--green-100);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: g-spin 0.65s linear infinite;
        margin: 0 auto 1rem;
    }

    @keyframes g-spin { to { transform: rotate(360deg); } }

    #g-loading-msg {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-2);
        margin: 0;
    }

    #g-loading-sub {
        font-size: 0.75rem;
        color: var(--text-3);
        margin: 0.3rem 0 0;
    }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    {% block head %}{% endblock %}
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header>
    <a href="/catalog" class="brand">
        <div class="brand-icon">
            <img src="/static/favicon.svg" width="26" height="26" alt="PlantOS">
        </div>
        <span class="brand-text">Plant<em>OS</em></span>
    </a>
    <span class="header-pill">v1.0</span>
    <div class="header-right">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span class="status-label">Online</span>
        </div>
    </div>
</header>

<!-- ── Desktop Nav ────────────────────────────────────── -->
<nav class="desktop-nav">
    <a href="/catalog" class="{{ 'active' if request.url.path.startswith('/catalog') else '' }}">
        <img src="/static/favicon.svg" width="14" height="14" alt="" style="vertical-align:middle;opacity:0.85;"> Plant Catalog
    </a>
</nav>

<!-- ── Main Content ───────────────────────────────────── -->
<main>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer>PlantOS · AI-Powered Plant Monitoring · v1.0</footer>

<!-- ── Mobile Bottom Nav ──────────────────────────────── -->
<nav class="mobile-nav" aria-label="Main navigation">
    <a href="/catalog" class="{{ 'active' if request.url.path.startswith('/catalog') else '' }}">
        <span class="nav-icon"><img src="/static/favicon.svg" width="22" height="22" alt=""></span>
        Catalog
    </a>
    <a href="/catalog?add=1" class="mob-fab" aria-label="Add plant">
        <span class="nav-icon">＋</span>
    </a>
    <a href="/catalog" style="opacity:0.35; pointer-events:none;" aria-hidden="true">
        <span class="nav-icon">📊</span>
        Stats
    </a>
</nav>

<!-- ── Global Loading Overlay ─────────────────────────── -->
<div id="g-loading" role="status" aria-live="polite" aria-label="Loading">
    <div id="g-loading-box">
        <div class="g-spinner"></div>
        <p id="g-loading-msg">Processing…</p>
        <p id="g-loading-sub">This may take a moment</p>
    </div>
</div>

<script>
    // ── Global loading helpers ──────────────────────────────── //
    function showLoading(msg, sub) {
        document.getElementById('g-loading-msg').textContent = msg || 'Processing…';
        document.getElementById('g-loading-sub').textContent = sub || 'This may take a moment';
        document.getElementById('g-loading').classList.add('active');
    }

    // ── Strip _t cache-buster from URL bar after load ──────── //
    // Keeps the address bar clean after forced navigations
    (function () {
        const u = new URL(window.location.href);
        if (u.searchParams.has('_t')) {
            u.searchParams.delete('_t');
            history.replaceState(null, '', u.toString());
        }
    })();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
